<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xozmag Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background-color: #f4f4f9; }
        
        /* Mahsulotlar konteyneri - 2 ta ustun uchun */
        .catalog { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 2 ta teng qator */
            gap: 10px; 
        }
        
        .product { 
            background: white; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        button { width: 100%; padding: 8px; background: #2ea6ff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Mahsulotlar</h2>
    
    <div class="catalog">
        <div class="product">
            <p>Telefon</p>
            <b>100 000 so'm</b>
            <button onclick="addToCart('Telefon', 100000)">Qo'shish</button>
        </div>
        <div class="product">
            <p>Quloqchin</p>
            <b>50 000 so'm</b>
            <button onclick="addToCart('Quloqchin', 50000)">Qo'shish</button>
        </div>
    </div>

    <div id="cart" style="margin-top:20px; text-align:center;">Savat: 0 so'm</div>
    <button style="background: green; padding: 15px; margin-top: 10px;" onclick="sendOrder()">Rasmiylashtirish</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            document.getElementById('cart').innerText = "Savat: " + total + " so'm";
        }

        function sendOrder() {
            let data = { items: cart, totalPrice: total };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
