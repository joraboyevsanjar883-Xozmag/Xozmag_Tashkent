<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xozmag Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f9f9f9; }
        .header { background: #fff; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product { background: white; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 100px; border-radius: 8px; object-fit: cover; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #eee; box-sizing: border-box; }
        .order-btn { background: #28a745; color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🛍 Xozmag Tashkent</div>
    <div class="catalog" id="catalog">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1594631252845-29fc4cc8c784">
            <p>Piyola Paxtagul</p>
            <button onclick="addToCart('Piyola Paxtagul', 5000)">Savatga (+5000)</button>
        </div>
        <div class="product">
            <img src="https://images.unsplash.com/photo-1577705998148-382f61a156e5">
            <p>Tarelka Chorgul</p>
            <button onclick="addToCart('Tarelka Chorgul', 15000)">Savatga (+15000)</button>
        </div>
    </div>
    <div class="footer">
        <div id="total">Jami: 0 so'm</div>
        <button class="order-btn" onclick="sendOrder()">Rasmiylashtirish</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let total = 0;
        function addToCart(name, price) { total += price; document.getElementById('total').innerText = "Jami: " + total + " so'm"; }
        function sendOrder() { tg.sendData(JSON.stringify({total: total})); }
    </script>
</body>
</html>
