<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xozmag Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background-color: #f4f4f9; }
        .product { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px; background: #2ea6ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #cart { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Katalog</h1>
    
    <div class="product">
        <span>Telefon - 100 000 so'm</span>
        <button onclick="addToCart('Telefon', 100000)">Qo'shish</button>
    </div>
    <div class="product">
        <span>Quloqchin - 50 000 so'm</span>
        <button onclick="addToCart('Quloqchin', 50000)">Qo'shish</button>
    </div>

    <div id="cart">Savat: 0 so'm</div>
    <button style="width: 100%; margin-top: 20px; background: green;" onclick="sendOrder()">Rasmiylashtirish</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            document.getElementById('cart').innerText = "Savat: " + total + " so'm";
        }

        function sendOrder() {
            let data = {
                items: cart,
                total: total
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
