<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>XOZMAG Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .product-card { background: white; margin: 10px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .cart-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #ddd; }
        .btn { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lang-selector">
    <button onclick="setLang('uz')">O'zbekcha</button>
    <button onclick="setLang('rus')">Русский</button>
</div>

<div id="main-content" style="display:none;">
    <h2 id="title">XOZMAG Tashkent</h2>
    <div id="catalog"></div>
    <button onclick="openCart()">🛒 <span id="cart-btn">Savat</span></button>
</div>

<div id="cartModal" style="display:none; background:white; position:fixed; top:0; width:100%; height:100%; padding:20px;">
    <h3 id="cart-title">Savatcha</h3>
    <div id="cartItems"></div>
    <p>Jami: <span id="totalPrice">0</span> so'm</p>
    <button onclick="checkout()">Rasmiylashtirish</button>
    <button onclick="closeCart()">Yopish</button>
</div>

<script>
    let lang = 'uz';
    let cart = []; // {id, name, price, qty}
    const products = [
        {id: 1, name: "Atir", price: 50000},
        {id: 2, name: "Sement", price: 80000}
    ];

    function setLang(l) {
        lang = l;
        document.getElementById('lang-selector').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        render();
    }

    function render() {
        document.getElementById('catalog').innerHTML = products.map(p => `
            <div class="product-card">
                <span>${p.name} - ${p.price} so'm</span>
                <button onclick="addToCart(${p.id})">+</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        let p = products.find(i => i.id === id);
        let exists = cart.find(i => i.id === id);
        if(exists) exists.qty++;
        else cart.push({...p, qty: 1});
        updateCartCount();
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        openCart();
    }

    function openCart() {
        document.getElementById('cartModal').style.display = 'block';
        document.getElementById('cartItems').innerHTML = cart.map(i => `
            <div class="cart-item">
                ${i.name} (${i.qty} x ${i.price}) 
                <button onclick="removeFromCart(${i.id})">❌</button>
            </div>
        `).join('');
        document.getElementById('totalPrice').innerText = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    }

    function checkout() {
        const data = {
            items: cart.map(i => `${i.name} x${i.qty}`).join(", "),
            total: cart.reduce((s, i) => s + (i.price * i.qty), 0)
        };
        window.Telegram.WebApp.sendData(JSON.stringify(data));
    }

    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
    function updateCartCount() { document.getElementById('cart-btn').innerText = cart.length; }
</script>
</body>
</html>
