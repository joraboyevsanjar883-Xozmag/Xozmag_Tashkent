<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOZMAG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .product { border: 1px solid #ddd; padding: 10px; margin: 5px; display: flex; justify-content: space-between; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding: 5px 0; }
    </style>
</head>
<body>

<div id="lang-menu">
    <button onclick="setLang('uz')">O'zbekcha</button>
    <button onclick="setLang('rus')">Русский</button>
</div>

<div id="shop" style="display:none;">
    <h1 id="title">Katalog</h1>
    <div id="products"></div>
    <br>
    <button onclick="openCart()">🛒 Savat / Корзина (<span id="count">0</span>)</button>
</div>

<div id="cart-menu" style="display:none;">
    <h2 id="cart-title">Savat</h2>
    <div id="items"></div>
    <h3>Jami: <span id="total">0</span></h3>
    <button onclick="checkout()">✅ Rasmiylashtirish / Оформить</button>
    <button onclick="backToShop()">🔙 Ortga</button>
</div>

<script>
    let lang = 'uz';
    let cart = [];
    const products = [
        {id: 1, name_uz: "Atir", name_ru: "Духи", price: 50000},
        {id: 2, name_uz: "Sement", name_ru: "Цемент", price: 80000}
    ];

    function setLang(l) {
        lang = l;
        document.getElementById('lang-menu').style.display = 'none';
        document.getElementById('shop').style.display = 'block';
        renderProducts();
    }

    function renderProducts() {
        document.getElementById('products').innerHTML = products.map(p => `
            <div class="product">
                <span>${lang === 'uz' ? p.name_uz : p.name_ru} - ${p.price}</span>
                <button onclick="addToCart(${p.id})">+</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(i => i.id === id);
        cart.push(p);
        document.getElementById('count').innerText = cart.length;
    }

    function openCart() {
        document.getElementById('shop').style.display = 'none';
        document.getElementById('cart-menu').style.display = 'block';
        document.getElementById('items').innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <span>${lang === 'uz' ? item.name_uz : item.name_ru}</span>
                <button onclick="removeItem(${index})">❌</button>
            </div>
        `).join('');
        document.getElementById('total').innerText = cart.reduce((a, b) => a + b.price, 0);
    }

    function removeItem(index) {
        cart.splice(index, 1);
        openCart();
        document.getElementById('count').innerText = cart.length;
    }

    function backToShop() {
        document.getElementById('cart-menu').style.display = 'none';
        document.getElementById('shop').style.display = 'block';
    }

    function checkout() {
        const total = cart.reduce((a, b) => a + b.price, 0);
        const items = cart.map(i => (lang === 'uz' ? i.name_uz : i.name_ru)).join(", ");
        window.Telegram.WebApp.sendData(JSON.stringify({items: items, total: total}));
    }
</script>
</body>
</html>
