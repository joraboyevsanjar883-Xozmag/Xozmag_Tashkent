<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOZMAG Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #27ae60; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: white; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        .search-box { padding: 15px; }
        .search-box input { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #ccc; box-sizing: border-box; }
        .catalog { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-add { background: var(--main); color: white; border: none; padding: 10px; width: 100%; border-radius: 15px; margin-top: 10px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }
        .btn-checkout { background: var(--main); color: white; border: none; padding: 15px 25px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">🛒 XOZMAG Tashkent</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish..." onkeyup="filter()">
</div>

<div class="catalog" id="catalog"></div>

<div class="footer">
    <span id="totalText">Jami: 0 so'm</span>
    <button class="btn-checkout" onclick="checkout()">Rasmiylashtirish</button>
</div>

<script>
    const products = [
        {id: 1, name: "Piyola Paxtagul", price: 5000},
        {id: 2, name: "Suyuq sovun 5L", price: 32000},
        {id: 3, name: "Parfum Perfume", price: 55000}
    ];

    let cart = [];
    const tg = window.Telegram.WebApp;
    tg.expand(); // Oynani to'liq ochadi

    function render(list) {
        document.getElementById('catalog').innerHTML = list.map(p => `
            <div class="card">
                <div>${p.name}</div>
                <div style="font-weight:bold; margin:5px 0;">${p.price} so'm</div>
                <button class="btn-add" onclick="add(${p.id})">Savatga</button>
            </div>
        `).join('');
    }

    function add(id) {
        cart.push(products.find(p => p.id === id));
        update();
    }

    function update() {
        let sum = cart.reduce((a, b) => a + b.price, 0);
        document.getElementById('totalText').innerText = `Jami: ${sum} so'm`;
    }

    function filter() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        render(products.filter(p => p.name.toLowerCase().includes(val)));
    }

    function checkout() {
        if(cart.length === 0) return alert("Savat bo'sh!");
        const data = { 
            items: cart.map(i => i.name).join(", "), 
            total: cart.reduce((a, b) => a + b.price, 0) 
        };
        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    render(products);
</script>
</body>
</html>
