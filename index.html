<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xozmag Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding-bottom: 80px; background: #f4f4f9; }
        .header { background: #1a2a6c; color: white; padding: 15px; text-align: center; font-weight: bold; border-bottom: 3px solid #ffcc00; }
        .categories { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: white; white-space: nowrap; }
        .categories button { padding: 8px 15px; border: 1px solid #1a2a6c; border-radius: 20px; background: white; color: #1a2a6c; font-weight: bold; cursor: pointer; }
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .product { background: white; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 100px; border-radius: 10px; object-fit: cover; }
        .product p { margin: 8px 0 5px 0; font-weight: 600; font-size: 0.9rem; }
        .price { color: #555; font-size: 0.85rem; margin-bottom: 8px; display: block; }
        .add-btn { background: #ffcc00; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; box-sizing: border-box; }
        .order-btn { background: #28a745; color: white; padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🛍 Xozmag Tashkent</div>

    <div class="categories">
        <button>Parfumeriya</button>
        <button>Kosmetika</button>
        <button>Chinni</button>
        <button>Qurilish</button>
    </div>

    <div class="catalog" id="catalog">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1594631252845-29fc4cc8c784">
            <p>Piyola Paxtagul</p>
            <span class="price">10 000 so'm</span>
            <button class="add-btn" onclick="addToCart('Piyola Paxtagul', 10000)">Savatga</button>
        </div>
        <div class="product">
            <img src="https://images.unsplash.com/photo-1577705998148-382f61a156e5">
            <p>Tarelka Chorgul</p>
            <span class="price">15 000 so'm</span>
            <button class="add-btn" onclick="addToCart('Tarelka Chorgul', 15000)">Savatga</button>
        </div>
    </div>

    <div class="footer">
        <div id="total" style="font-weight: bold;">Jami: 0 so'm</div>
        <button class="order-btn" id="order-btn" onclick="sendOrder()">Rasmiylashtirish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let total = 0;
        
        // Tilni URL dan aniqlash
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');

        // Tilga qarab interfeysni moslash
        if (lang === 'rus') {
            document.getElementById('order-btn').innerText = "Оформить заказ";
            document.getElementById('total').innerText = "Итого: 0 сум";
        }

        function addToCart(name, price) { 
            total += price; 
            const totalText = (lang === 'rus') ? "Итого: " + total + " сум" : "Jami: " + total + " so'm";
            document.getElementById('total').innerText = totalText;
            tg.HapticFeedback.impactOccurred('light');
        }

        function sendOrder() { 
            // Botga yuboriladigan aniq ma'lumot formati
            let data = {
                items: "Mahsulotlar tanlandi",
                total: total
            };
            tg.sendData(JSON.stringify(data)); 
        }
    </script>
</body>
</html>
