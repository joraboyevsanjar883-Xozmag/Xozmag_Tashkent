<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xozmag Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; padding-bottom: 80px; }
        .header { text-align: center; padding: 15px; font-weight: bold; background: white; margin-bottom: 10px; }
        
        /* Kategoriyalar */
        .tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; }
        .tab-btn { border: none; background: #e2e8f0; padding: 10px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #3b82f6; color: white; }

        /* Mahsulotlar */
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .product { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        .product p { font-size: 14px; margin: 8px 0; font-weight: 500; }
        .product b { color: #3b82f6; }
        .add-btn { background: #3b82f6; color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: #1a202c; color: white; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🛒 Xozmag Tashkent</div>
    
    <div class="tabs">
        <button class="tab-btn active">📦 Hammasi</button>
        <button class="tab-btn">✨ Parfumeriya & Kosmetika</button>
    </div>

    <div class="catalog">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1594631252845-29fc4cc8c784" alt="Piyola">
            <p>Piyola Paxtagul</p>
            <b>5 000 so'm</b>
            <button class="add-btn" onclick="addToCart('Piyola Paxtagul', 5000)">Savatga</button>
        </div>
        <div class="product">
            <img src="https://images.unsplash.com/photo-1577705998148-382f61a156e5" alt="Piyola">
            <p>Piyola Chorgul (Zarhal)</p>
            <b>5 000 so'm</b>
            <button class="add-btn" onclick="addToCart('Piyola Chorgul', 5000)">Savatga</button>
        </div>
    </div>

    <div class="footer" onclick="sendOrder()">
        Rasmiylashtirish (Jami: <span id="total">0</span> so'm)
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let cart = []; let total = 0;
        function addToCart(name, price) { 
            cart.push({name, price}); total += price; 
            document.getElementById('total').innerText = total; 
        }
        function sendOrder() { 
            tg.sendData(JSON.stringify({items: cart, total: total})); 
        }
    </script>
</body>
</html>
