<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    let total = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const lang = urlParams.get('lang');

    if (lang === 'rus') {
        document.getElementById('title').innerText = "Xozmag Tashkent (Каталог)";
        document.getElementById('order-btn').innerText = "Оформить заказ";
        document.getElementById('total-text').innerText = "Итого: 0 сум";
    }

    function addToCart(price) { 
        total += price; 
        document.getElementById('total-text').innerText = (lang === 'rus') ? "Итого: " + total + " сум" : "Jami: " + total + " so'm";
        tg.HapticFeedback.impactOccurred('light');
    }

    function sendOrder() { 
        if (total === 0) {
            alert(lang === 'rus' ? "Корзина пуста!" : "Savat bo'sh!");
            return;
        }
        // Ma'lumot yuborish
        tg.sendData(JSON.stringify({"total": total}));
        // Oynani yopish - muhim!
        tg.close();
    }
</script>
