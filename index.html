<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .product { display: flex; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>XOZMAG Katalog</h3>
    <div id="catalog">
        <div class="product"><span>Atir</span> <button onclick="addToCart('Atir', 50000)">+</button></div>
        <div class="product"><span>Sement</span> <button onclick="addToCart('Sement', 80000)">+</button></div>
    </div>
    
    <hr>
    <h3>Savat</h3>
    <div id="cart"></div>
    <h4 id="total">Jami: 0 so'm</h4>
    <button onclick="checkout()" style="width:100%; padding:15px; background:green; color:white;">Rasmiylashtirish</button>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
        }
        function renderCart() {
            let container = document.getElementById('cart');
            container.innerHTML = cart.map((item, index) => 
                `<div>${item.name} <button onclick="cart.splice(${index},1); renderCart()">❌</button></div>`
            ).join('');
            document.getElementById('total').innerText = "Jami: " + cart.reduce((a,b) => a + b.price, 0) + " so'm";
        }
        function checkout() {
            let total = cart.reduce((a,b) => a + b.price, 0);
            let items = cart.map(i => i.name).join(", ");
            window.Telegram.WebApp.sendData(JSON.stringify({items: items, total: total}));
        }
    </script>
</body>
</html>
