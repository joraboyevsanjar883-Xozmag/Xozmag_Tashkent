<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOZMAG Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f4; margin: 0; padding-bottom: 90px; }
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        .search-box { padding: 10px; }
        .search-box input { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        .btn-add { background: #276d45; color: white; border: none; padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-top: 5px; width: 100%; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #276d45; }
        .btn-checkout { background: #276d45; color: white; border: none; padding: 15px 25px; border-radius: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <strong>XOZMAG</strong>
    <span>🛒 Savat: <span id="cartCount">0</span></span>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish..." onkeyup="filter()">
</div>

<div class="catalog" id="catalog"></div>

<div class="footer">
    <div style="font-weight: bold;">Jami: <span id="totalPrice">0</span> so'm</div>
    <button class="btn-checkout" onclick="checkout()">Rasmiylashtirish →</button>
</div>

<script>
    const products = [
        {id: 1, name: "Piyola Paxtagul", price: 230000},
        {id: 2, name: "Suyuq Sovun 5L", price: 100000},
        {id: 3, name: "Parfum Perfume", price: 250000}
    ];

    let cart = [];
    const tg = window.Telegram.WebApp;
    tg.expand();

    function render(list) {
        document.getElementById('catalog').innerHTML = list.map(p => `
            <div class="card">
                <div style="height: 100px; background:#eee; margin-bottom:5px;"></div>
                <div style="font-size: 14px;">${p.name}</div>
                <div style="font-weight:bold;">${p.price.toLocaleString()} so'm</div>
                <button class="btn-add" onclick="add(${p.id})">Savatga qo'shish +</button>
            </div>
        `).join('');
    }

    function add(id) {
        cart.push(products.find(p => p.id === id));
        update();
    }

    function update() {
        let total = cart.reduce((a, b) => a + b.price, 0);
        document.getElementById('totalPrice').innerText = total.toLocaleString();
        document.getElementById('cartCount').innerText = cart.length;
    }

    function filter() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        render(products.filter(p => p.name.toLowerCase().includes(val)));
    }

    function checkout() {
        if(cart.length === 0) return alert("Savat bo'sh!");
        
        const data = {
            items: cart.map(i => i.name).join(", "),
            total: cart.reduce((a, b) => a + b.price, 0)
        };
        
        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    render(products);
</script>
</body>
</html>
